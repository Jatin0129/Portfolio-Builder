<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MDB Journal Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #070b12;
        color: #e8f4f7;
        font-family: Aptos, "IBM Plex Sans", "Segoe UI", sans-serif;
      }
      main {
        max-width: 560px;
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(14, 20, 31, 0.96), rgba(10, 16, 26, 0.98));
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: rgba(232, 244, 247, 0.75);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MDB Journal is offline</h1>
      <p>
        The installed app is still available, but this screen needs a connection to refresh live data
        and sync your latest journal activity.
      </p>
    </main>
  </body>
</html>
